<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI応答システム - デモ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .demo-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .demo-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .output {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #e3f2fd;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #1976d2;
        }

        .status-indicator.thinking { background: #f3e5f5; color: #7b1fa2; }
        .status-indicator.analyzing { background: #e8eaf6; color: #5e35b1; }
        .status-indicator.generating { background: #e8f5e9; color: #388e3c; }
        .status-indicator.verifying { background: #fff3e0; color: #f57c00; }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .chunk {
            margin-bottom: 12px;
            padding: 10px;
            background: white;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .feature-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .feature-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .feature-card p {
            color: #666;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI応答システム</h1>
            <p>自然で信頼性の高いAI応答体験のデモンストレーション</p>
        </div>

        <div class="demo-section">
            <h2>📝 デモを実行</h2>
            <div class="button-group">
                <button onclick="runDemo('basic')">基本的なストリーミング</button>
                <button onclick="runDemo('fileAnalysis')">ファイル分析</button>
                <button onclick="runDemo('verification')">情報源の検証</button>
                <button onclick="runDemo('uncertain')">不確実な情報の扱い</button>
                <button onclick="runDemo('complex')">複雑なタスク</button>
                <button onclick="clearOutput()">クリア</button>
            </div>
            <div id="status"></div>
            <div id="output" class="output">デモを選択して実行してください...</div>
        </div>

        <div class="features">
            <div class="feature-card">
                <h3>✨ ストリーミング応答</h3>
                <p>1文ずつ順番に表示される自然な応答で、AIが考えながら答えている印象を与えます。</p>
            </div>
            <div class="feature-card">
                <h3>📊 進行状況の可視化</h3>
                <p>ファイル解析や生成処理の明確な状態表示で、ユーザーは現在の処理を把握できます。</p>
            </div>
            <div class="feature-card">
                <h3>🔍 情報源の検証</h3>
                <p>確認済み情報と推測情報を明確に分離し、各情報の信頼度を表示します。</p>
            </div>
            <div class="feature-card">
                <h3>✅ 高品質な応答</h3>
                <p>曖昧さを避け、確認できない情報については正直に伝えます。</p>
            </div>
        </div>

        <div class="footer">
            <p>Made with Bob | TypeScript + React</p>
        </div>
    </div>

    <script src="dist/web-demo.js"></script>
</body>
</html>
