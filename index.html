<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AI画像分析システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            padding: 20px 10px;
        }

        .header h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .upload-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
        }

        .upload-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .tab-button {
            flex: 1;
            min-width: 100px;
            padding: 12px 16px;
            background: #f3f4f6;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 600;
            color: #6b7280;
        }

        .tab-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-area:hover, .upload-area.dragover {
            background: #e8eaff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-area.has-image {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 1rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .upload-subtext {
            font-size: 0.85rem;
            color: #6b7280;
        }

        #fileInput {
            display: none;
        }

        .paste-area {
            border: 3px dashed #10b981;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            background: #f0fdf4;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .library-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .library-image:hover {
            transform: scale(1.05);
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .library-image.selected {
            border-color: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.5);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        button {
            flex: 1;
            min-width: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.secondary {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
        }

        button.analyze {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            font-size: 1.1rem;
            padding: 16px 24px;
        }

        .preview-container {
            margin: 15px 0;
            display: none;
        }

        .preview-container.show {
            display: block;
        }

        .image-preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .image-info {
            margin-top: 10px;
            padding: 10px;
            background: #f3f4f6;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #4b5563;
        }

        .output-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }

        .output-section.show {
            display: block;
        }

        .output-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #e3f2fd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            color: #1976d2;
            width: 100%;
        }

        .status-indicator.analyzing { background: #e8eaf6; color: #5e35b1; }
        .status-indicator.generating { background: #e8f5e9; color: #388e3c; }
        .status-indicator.complete { background: #f0fdf4; color: #10b981; }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid currentColor;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .output {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.6;
            -webkit-overflow-scrolling: touch;
        }

        .result-item {
            margin-bottom: 12px;
            padding: 12px;
            background: white;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message, .success-message, .info-message {
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            border-color: #dc2626;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            border-color: #10b981;
        }

        .info-message {
            background: #dbeafe;
            color: #1e40af;
            border-color: #3b82f6;
        }

        @media (max-width: 768px) {
            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
                min-width: auto;
            }

            .library-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }

            .library-image {
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 AI画像分析システム</h1>
            <p>画像をアップロード・貼り付け・選択して分析</p>
        </div>

        <div class="upload-section">
            <h2>🖼️ 画像を取得</h2>
            
            <div class="upload-tabs">
                <button class="tab-button active" onclick="switchTab('upload')">📤 アップロード</button>
                <button class="tab-button" onclick="switchTab('paste')">📋 貼り付け</button>
                <button class="tab-button" onclick="switchTab('library')">🎨 ライブラリ</button>
            </div>

            <!-- アップロードタブ -->
            <div id="uploadTab" class="tab-content active">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📤</div>
                    <div class="upload-text">タップして画像を選択</div>
                    <div class="upload-subtext">またはドラッグ&ドロップ</div>
                </div>
                <input type="file" id="fileInput" accept="image/*" capture="environment">
            </div>

            <!-- 貼り付けタブ -->
            <div id="pasteTab" class="tab-content">
                <div class="paste-area" id="pasteArea">
                    <div class="upload-icon">📋</div>
                    <div class="upload-text">ここをクリックしてCtrl+V (⌘+V)</div>
                    <div class="upload-subtext">クリップボードから画像を貼り付け</div>
                </div>
                <div class="info-message">
                    💡 画像をコピーしてから、上のエリアをクリックしてCtrl+V (Mac: ⌘+V) で貼り付けできます
                </div>
            </div>

            <!-- ライブラリタブ -->
            <div id="libraryTab" class="tab-content">
                <div class="info-message">
                    🎨 サンプル画像を選択してください
                </div>
                <div class="library-grid" id="libraryGrid"></div>
            </div>

            <div class="preview-container" id="previewContainer">
                <img id="imagePreview" class="image-preview" alt="プレビュー">
                <div class="image-info" id="imageInfo"></div>
            </div>

            <div class="button-group">
                <button class="analyze" id="analyzeBtn" disabled>🔍 画像を分析</button>
                <button class="secondary" id="clearBtn">🗑️ クリア</button>
            </div>
        </div>

        <div class="output-section" id="outputSection">
            <h2>📊 分析結果</h2>
            <div id="status"></div>
            <div id="output" class="output"></div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let selectedImage = null;
        let currentTab = 'upload';

        const uploadArea = document.getElementById('uploadArea');
        const pasteArea = document.getElementById('pasteArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const imageInfo = document.getElementById('imageInfo');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const outputSection = document.getElementById('outputSection');
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');
        const libraryGrid = document.getElementById('libraryGrid');

        // サンプル画像ライブラリ（Unsplash API使用）
        const sampleImages = [
            'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400',
            'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400',
            'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400',
            'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400',
            'https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=400',
            'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400',
            'https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=400',
            'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=400'
        ];

        // ライブラリ画像を読み込み
        function loadLibrary() {
            libraryGrid.innerHTML = '';
            sampleImages.forEach((url, index) => {
                const img = document.createElement('img');
                img.src = url;
                img.className = 'library-image';
                img.alt = `サンプル画像 ${index + 1}`;
                img.onclick = () => selectLibraryImage(url, img);
                libraryGrid.appendChild(img);
            });
        }

        // ライブラリ画像選択
        function selectLibraryImage(url, imgElement) {
            document.querySelectorAll('.library-image').forEach(img => {
                img.classList.remove('selected');
            });
            imgElement.classList.add('selected');
            
            selectedImage = url;
            imagePreview.src = url;
            previewContainer.classList.add('show');
            analyzeBtn.disabled = false;
            
            imageInfo.innerHTML = `
                <strong>ソース:</strong> Unsplash<br>
                <strong>タイプ:</strong> オンライン画像
            `;
            
            showSuccess('画像を選択しました！');
        }

        // タブ切り替え
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            
            if (tab === 'library') {
                loadLibrary();
            }
        }

        // アップロード: クリックでファイル選択
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // アップロード: ファイル選択時
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        });

        // アップロード: ドラッグ&ドロップ
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            } else {
                showError('画像ファイルを選択してください');
            }
        });

        // 貼り付け: クリックでフォーカス
        pasteArea.addEventListener('click', () => {
            pasteArea.focus();
            pasteArea.style.outline = '3px solid #10b981';
            showInfo('Ctrl+V (Mac: ⌘+V) で画像を貼り付けてください');
        });

        pasteArea.addEventListener('blur', () => {
            pasteArea.style.outline = 'none';
        });

        // 貼り付け: ペーストイベント
        pasteArea.addEventListener('paste', (e) => {
            e.preventDefault();
            const items = e.clipboardData.items;
            
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    const file = item.getAsFile();
                    handleFile(file);
                    return;
                }
            }
            
            showError('クリップボードに画像がありません');
        });

        // グローバルペーストイベント
        document.addEventListener('paste', (e) => {
            if (currentTab === 'paste') {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf('image') !== -1) {
                        e.preventDefault();
                        const file = item.getAsFile();
                        handleFile(file);
                        return;
                    }
                }
            }
        });

        // ファイル処理
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('画像ファイルのみ対応しています');
                return;
            }

            selectedFile = file;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedImage = e.target.result;
                imagePreview.src = selectedImage;
                previewContainer.classList.add('show');
                uploadArea.classList.add('has-image');
                analyzeBtn.disabled = false;
                
                const sizeKB = (file.size / 1024).toFixed(2);
                imageInfo.innerHTML = `
                    <strong>ファイル名:</strong> ${file.name}<br>
                    <strong>サイズ:</strong> ${sizeKB} KB<br>
                    <strong>タイプ:</strong> ${file.type}
                `;
                
                showSuccess('画像を読み込みました！');
            };
            reader.readAsDataURL(file);
        }

        // 分析ボタン
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedImage) {
                showError('画像を選択してください');
                return;
            }

            outputSection.classList.add('show');
            outputDiv.innerHTML = '';
            analyzeBtn.disabled = true;

            try {
                await analyzeImage();
            } catch (error) {
                showError('分析中にエラーが発生しました: ' + error.message);
            } finally {
                analyzeBtn.disabled = false;
            }
        });

        // クリアボタン
        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            selectedImage = null;
            fileInput.value = '';
            imagePreview.src = '';
            previewContainer.classList.remove('show');
            uploadArea.classList.remove('has-image');
            outputSection.classList.remove('show');
            analyzeBtn.disabled = true;
            statusDiv.innerHTML = '';
            outputDiv.innerHTML = '';
            document.querySelectorAll('.library-image').forEach(img => {
                img.classList.remove('selected');
            });
        });

        // 画像分析（デモ）
        async function analyzeImage() {
            setStatus('analyzing', '画像を分析中...');
            await delay(1000);

            setStatus('generating', '結果を生成中...');
            await delay(500);

            const results = [
                '✅ 画像の読み込みに成功しました',
                '🔍 画像サイズ: ' + (imagePreview.naturalWidth || '不明') + ' x ' + (imagePreview.naturalHeight || '不明') + ' ピクセル',
                '🎨 カラー画像として認識されました',
                '📊 画像の品質: 良好',
                '💡 この画像は分析可能な状態です',
                '🌟 分析完了: すべてのチェックをパスしました'
            ];

            for (const result of results) {
                await delay(400);
                addResult(result);
            }

            setStatus('complete', '✅ 分析完了');
            await delay(1000);
            statusDiv.innerHTML = '';
        }

        // ステータス表示
        function setStatus(type, message) {
            statusDiv.innerHTML = `
                <div class="status-indicator ${type}">
                    ${type !== 'complete' ? '<span class="spinner"></span>' : ''}
                    <span>${message}</span>
                </div>
            `;
        }

        // 結果追加
        function addResult(text) {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.textContent = text;
            outputDiv.appendChild(div);
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        // メッセージ表示
        function showMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = type + '-message';
            messageDiv.textContent = message;
            
            const section = document.querySelector('.upload-section');
            section.insertBefore(messageDiv, section.firstChild);
            
            setTimeout(() => messageDiv.remove(), 3000);
        }

        function showError(message) {
            showMessage('❌ ' + message, 'error');
        }

        function showSuccess(message) {
            showMessage('✅ ' + message, 'success');
        }

        function showInfo(message) {
            showMessage('💡 ' + message, 'info');
        }

        // 遅延関数
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // グローバル関数として公開
        window.switchTab = switchTab;

        // ページ読み込み時
        console.log('AI画像分析システム準備完了');
        console.log('✅ アップロード機能');
        console.log('✅ 貼り付け機能 (Ctrl+V)');
        console.log('✅ ライブラリ選択機能');
    </script>
</body>
</html>
